<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🔬 Ciencias Naturales — ¡El Juego!</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
:root {
  --card: rgba(255,255,255,0.72);
  --card-solid: #ffffff;
  --ink: #182338;
  --ink-title: #122039;
  --ink-muted: #42526d;
  --ink-soft: #5c6b84;
  --radius: 24px;
  --radius-lg: 32px;
  --glow-pink: #ff4dc4;
  --glow-cyan: #00e5ff;
  --glow-yellow: #ffe234;
  --glow-green: #39ff6e;
  --glow-orange: #ff7b2c;
  --font-ui: 'Nunito', sans-serif;
  --weight-medium: 600;
  --weight-bold: 700;
  --weight-xbold: 800;
  --weight-black: 900;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font-ui);
  background:
    linear-gradient(135deg, rgba(255,234,245,0.78) 0%, rgba(232,244,255,0.72) 35%, rgba(230,255,244,0.68) 65%, rgba(255,249,224,0.72) 100%),
    url('FONDOS/FONDO.png') center center / cover no-repeat fixed;
  background-attachment: fixed;
  animation: bgPulse 8s ease-in-out infinite alternate;
  color: var(--ink);
  min-height: 100vh;
  overflow-x: hidden;
}
@keyframes bgPulse {
  0%   { filter: brightness(1) saturate(1); }
  50%  { filter: brightness(1.04) saturate(1.12); }
  100% { filter: brightness(1) saturate(1); }
}

/* ═══ BUBBLE FIELD ═══ */
.bubblefield {
  position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
}
.bubble {
  position: absolute;
  border-radius: 50%;
  animation: bubbleFloat var(--dur, 18s) linear infinite var(--delay, 0s);
  will-change: transform;
}
@keyframes bubbleFloat {
  0%   { transform: translateY(110vh) scale(0.7) rotate(0deg); opacity: 0; }
  6%   { opacity: var(--op, 0.14); }
  90%  { opacity: var(--op, 0.14); }
  100% { transform: translateY(-18vh) scale(1.2) rotate(360deg); opacity: 0; }
}

/* ═══ SPARKLE FIELD ═══ */
.sparklefield {
  position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
}
.sparkle-star {
  position: absolute;
  pointer-events: none;
  animation: sparkleTwinkle var(--s-dur, 2s) ease-in-out infinite var(--s-delay, 0s);
  will-change: transform, opacity;
}
@keyframes sparkleTwinkle {
  0%,100% { transform: scale(0) rotate(0deg); opacity: 0; }
  30%     { transform: scale(1) rotate(90deg); opacity: 1; }
  60%     { transform: scale(0.6) rotate(180deg); opacity: 0.6; }
  80%     { transform: scale(1.2) rotate(270deg); opacity: 0.9; }
}

/* ═══ SCREEN FLASH ═══ */
.screen-flash {
  position: fixed; inset: 0; z-index: 500; pointer-events: none;
  border-radius: 0;
  animation: screenFlashAnim 0.5s ease-out forwards;
  mix-blend-mode: screen;
}
@keyframes screenFlashAnim {
  0%   { opacity: 0.85; }
  30%  { opacity: 0.5; }
  100% { opacity: 0; }
}

/* ═══ SHOCKWAVE ═══ */
.shockwave-ring {
  position: fixed; pointer-events: none; z-index: 200;
  border-radius: 50%;
  border: 3px solid;
  transform: translate(-50%, -50%) scale(0);
  animation: shockwaveExpand 0.7s cubic-bezier(0.2, 0.8, 0.3, 1) forwards;
  will-change: transform, opacity;
}
@keyframes shockwaveExpand {
  0%   { transform: translate(-50%,-50%) scale(0);   opacity: 0.9; }
  40%  { transform: translate(-50%,-50%) scale(1.2); opacity: 0.7; }
  100% { transform: translate(-50%,-50%) scale(4.5); opacity: 0; }
}
.shockwave-ring-2 {
  animation-delay: 0.12s;
  border-width: 2px;
}
.shockwave-ring-3 {
  animation-delay: 0.24s;
  border-width: 1px;
}

/* ═══ CONFETTI ═══ */
.confetti-layer {
  position: fixed; inset: 0; pointer-events: none; z-index: 150; overflow: hidden;
}
.confetti-piece {
  position: absolute;
  animation: confettiFall var(--cf-dur, 1.2s) ease-in forwards var(--cf-delay, 0s);
  will-change: transform, opacity;
  border-radius: var(--cf-br, 2px);
}
@keyframes confettiFall {
  0%   { transform: translateY(-40px) translateX(0) rotate(0deg) scale(1); opacity: 1; }
  80%  { opacity: 1; }
  100% { transform: translateY(var(--cf-ty, 600px)) translateX(var(--cf-tx, 0px)) rotate(var(--cf-rot, 720deg)) scale(0.4); opacity: 0; }
}

/* ═══ PARTICLES ═══ */
.particles-layer {
  position: fixed; inset: 0; pointer-events: none; z-index: 100; overflow: hidden;
}
.particle {
  position: absolute;
  animation: particleFly var(--p-dur, .8s) cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
  will-change: transform, opacity;
}
@keyframes particleFly {
  0%   { opacity: 1; transform: translate(0,0) scale(1) rotate(0deg); }
  60%  { opacity: 0.8; }
  100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.1) rotate(var(--pr,180deg)); }
}

/* ═══ REACTION OVERLAY ═══ */
.reaction-overlay {
  position: fixed; top: 43%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 300; pointer-events: none;
  animation: reactionPop .42s cubic-bezier(.34,1.76,.64,1);
  will-change: transform;
}
.reaction-overlay img {
  max-width: 180px; width: 46vw; height: auto;
  object-fit: contain; display: block;
  filter: drop-shadow(0 8px 32px rgba(0,0,0,0.35));
}
@keyframes reactionPop {
  from { opacity: 0; transform: translate(-50%, -50%) scale(0.3) rotate(-8deg); }
  60%  { transform: translate(-50%, -50%) scale(1.15) rotate(3deg); }
  to   { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(0deg); }
}

/* ═══ CAMERA SHAKE ═══ */
@keyframes cameraShake {
  0%,100% { transform: translateX(0) rotate(0deg) scale(1); }
  10%     { transform: translateX(-16px) rotate(-2deg) scale(1.02); }
  22%     { transform: translateX(16px)  rotate(2deg)  scale(0.98); }
  35%     { transform: translateX(-12px) rotate(-1.5deg) scale(1.01); }
  48%     { transform: translateX(12px)  rotate(1.5deg); }
  62%     { transform: translateX(-7px)  rotate(-1deg); }
  75%     { transform: translateX(7px)   rotate(0.8deg); }
  87%     { transform: translateX(-3px)  rotate(-0.3deg); }
}
.camera-shake {
  animation: cameraShake 0.6s ease !important;
}

/* ═══ GLASS ═══ */
.glass {
  background: rgba(255,255,255,0.76);
  border: 1px solid rgba(255,255,255,0.92);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-radius: var(--radius-lg);
  box-shadow: 0 8px 40px rgba(0,0,0,0.10), 0 2px 0 rgba(255,255,255,0.6) inset;
}

/* ═══ APP ═══ */
.app {
  position: relative; z-index: 1;
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; padding: 20px 16px 48px;
}

/* ═══ WELCOME ═══ */
.welcome-wrap {
  display: flex; flex-direction: column; align-items: center;
  gap: 0; max-width: 520px; width: 100%; margin-top: 0;
  animation: megaPopIn .7s cubic-bezier(.34,1.56,.64,1);
}
@keyframes megaPopIn {
  from { opacity: 0; transform: scale(.65) translateY(30px) rotate(-3deg); }
  60%  { transform: scale(1.06) translateY(-6px) rotate(1deg); }
  to   { opacity: 1; transform: scale(1) translateY(0) rotate(0deg); }
}
.logo-block {
  text-align: center;
  position: relative;
  width: 100%;
  margin-bottom: 8px;
}
.logo-front-image {
  width: min(100%, 380px);
  height: auto;
  display: block;
  margin: 0 auto 4px;
  object-fit: contain;
  animation: logoFloat 3s ease-in-out infinite, logoGlow 2.5s ease-in-out infinite alternate;
  filter: drop-shadow(0 10px 30px rgba(255,77,196,0.3));
  will-change: transform, filter;
}
@keyframes logoFloat {
  0%, 100% { transform: translateY(0) rotate(-0.5deg); }
  50%       { transform: translateY(-14px) rotate(0.5deg); }
}
@keyframes logoGlow {
  from { filter: drop-shadow(0 10px 30px rgba(255,77,196,0.2)) drop-shadow(0 0 0 rgba(255,77,196,0)); }
  to   { filter: drop-shadow(0 10px 40px rgba(255,77,196,0.55)) drop-shadow(0 0 30px rgba(155,93,255,0.3)); }
}

.name-card {
  padding: 28px 32px 34px; width: 100%;
  display: flex; flex-direction: column; gap: 20px;
  align-items: center;
  text-align: center;
  border-radius: var(--radius-lg);
  position: relative;
  overflow: hidden;
}
.name-card::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,77,196,0.06), rgba(155,93,255,0.06));
  pointer-events: none;
}
.name-card::after {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
  animation: shimmerSweep 3.5s ease-in-out infinite;
  pointer-events: none;
}
@keyframes shimmerSweep {
  0%   { left: -60%; }
  100% { left: 160%; }
}

.name-label {
  font-family: var(--font-ui);
  font-size: clamp(1.75rem, 7.6vw, 2.2rem);
  font-weight: var(--weight-black);
  line-height: 1.08;
  color: var(--ink-title);
  letter-spacing: -0.04em;
  max-width: 12ch;
  position: relative; z-index: 1;
}
.name-input {
  width: min(100%, 300px); padding: 16px 20px;
  align-self: center;
  font-family: var(--font-ui);
  font-size: clamp(1.375rem, 6vw, 1.625rem);
  font-weight: var(--weight-bold);
  border: 2px solid rgba(255,77,196,0.42); border-radius: 22px;
  background: rgba(255,255,255,0.92); color: var(--ink-title);
  outline: none; text-align: center;
  transition: border-color .2s, box-shadow .2s, transform .2s;
  position: relative; z-index: 1;
}
.name-input:focus {
  border-color: var(--glow-pink);
  box-shadow: 0 0 0 5px rgba(255,77,196,0.18), 0 12px 28px rgba(18,32,57,0.1);
  transform: scale(1.02);
}
.name-input::placeholder { color: var(--ink-soft); opacity: 1; }

/* ═══ SELECT ═══ */
.select-wrap {
  max-width: 760px; width: 100%;
  display: flex; flex-direction: column; gap: 20px;
  animation: slideUpSpring .5s cubic-bezier(.34,1.56,.64,1);
}
@keyframes slideUpSpring {
  from { opacity: 0; transform: translateY(40px) scale(0.95); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.select-card {
  padding: 28px 26px 30px;
  display: flex; flex-direction: column; gap: 22px;
  position: relative; overflow: hidden;
}
.select-card::after {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 50%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
  animation: shimmerSweep 4s ease-in-out infinite;
  pointer-events: none;
}
.select-top {
  display: flex; align-items: center; justify-content: space-between; gap: 18px;
}
.select-copy { display: flex; flex-direction: column; gap: 8px; }
.select-kicker {
  font-size: .88rem; font-weight: var(--weight-black);
  letter-spacing: .12em; text-transform: uppercase;
  color: var(--glow-pink);
}
.select-title {
  font-size: clamp(2rem, 6vw, 2.7rem); font-weight: var(--weight-black);
  line-height: 1.02; letter-spacing: -0.04em; color: var(--ink-title);
}
.select-sub { max-width: 32ch; font-size: 1rem; font-weight: var(--weight-bold); line-height: 1.42; color: var(--ink-muted); }
.select-preview {
  width: 112px; height: 112px; padding: 12px; border-radius: 26px;
  background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(255,255,255,0.72));
  border: 1px solid rgba(255,255,255,0.92);
  box-shadow: 0 14px 34px rgba(24,35,56,0.12); flex-shrink: 0;
  animation: previewBob 2.5s ease-in-out infinite;
}
@keyframes previewBob {
  0%,100% { transform: translateY(0); }
  50%     { transform: translateY(-6px); }
}
.select-preview img { width: 100%; height: 100%; object-fit: contain; display: block; }
.select-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 16px;
}
.avatar-card {
  position: relative;
  border: 2px solid rgba(24,35,56,0.08); border-radius: 28px;
  background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(255,255,255,0.82));
  padding: 18px; cursor: pointer;
  transition: transform .2s cubic-bezier(.34,1.56,.64,1), box-shadow .2s, border-color .2s;
  text-align: left; overflow: hidden;
  animation: cardStaggerIn .4s cubic-bezier(.34,1.56,.64,1) backwards;
}
@keyframes cardStaggerIn {
  from { opacity: 0; transform: scale(0.7) translateY(20px) rotate(-2deg); }
  to   { opacity: 1; transform: scale(1) translateY(0) rotate(0deg); }
}
.avatar-card::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(circle at top right, rgba(255,77,196,0.16), transparent 46%);
  pointer-events: none;
}
.avatar-card:hover {
  transform: translateY(-7px) scale(1.04) rotate(1deg);
  box-shadow: 0 22px 44px rgba(24,35,56,0.16), 0 0 0 2px rgba(255,77,196,0.3);
}
.avatar-card.selected {
  border-color: var(--glow-pink);
  box-shadow: 0 18px 40px rgba(255,77,196,0.25), 0 0 0 3px rgba(255,77,196,0.2);
  transform: scale(1.03);
  animation: selectedPulse 1.5s ease-in-out infinite alternate;
}
@keyframes selectedPulse {
  from { box-shadow: 0 18px 40px rgba(255,77,196,0.25), 0 0 20px rgba(255,77,196,0.2); }
  to   { box-shadow: 0 22px 50px rgba(255,77,196,0.4),  0 0 35px rgba(255,77,196,0.35); }
}
.avatar-figure {
  width: 100%; aspect-ratio: 1/1; border-radius: 22px;
  background: linear-gradient(180deg, rgba(255,241,248,0.95), rgba(235,247,255,0.85));
  display: flex; align-items: center; justify-content: center; padding: 14px;
  position: relative; z-index: 1;
  transition: transform .2s;
}
.avatar-card:hover .avatar-figure { transform: scale(1.08) translateY(-3px); }
.avatar-figure img { width: 100%; height: 100%; object-fit: contain; display: block; filter: drop-shadow(0 10px 20px rgba(18,32,57,0.18)); }
.avatar-meta { position: relative; z-index: 1; display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-top: 14px; }
.avatar-name { font-size: 1.08rem; font-weight: var(--weight-black); color: var(--ink-title); }
.avatar-note { margin-top: 4px; font-size: .95rem; font-weight: var(--weight-bold); color: var(--ink-soft); }
.avatar-check {
  width: 34px; height: 34px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  background: rgba(24,35,56,0.08); color: transparent;
  font-size: 1rem; transition: all .25s cubic-bezier(.34,1.56,.64,1);
}
.avatar-card.selected .avatar-check {
  background: linear-gradient(135deg, var(--glow-pink), #ff9a5f);
  color: white; transform: scale(1.2) rotate(360deg);
  box-shadow: 0 4px 12px rgba(255,77,196,0.5);
}
.select-actions { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
.player-chip {
  display: inline-flex; align-items: center; gap: 10px; padding: 10px 14px;
  border-radius: 999px; background: rgba(255,255,255,0.88);
  border: 1px solid rgba(255,255,255,0.92);
  box-shadow: 0 8px 24px rgba(24,35,56,0.08);
  transition: transform .2s;
}
.player-chip:hover { transform: scale(1.04); }
.player-chip img { width: 42px; height: 42px; object-fit: contain; display: block; }
.player-chip-copy { display: flex; flex-direction: column; gap: 2px; text-align: left; }
.player-chip-label { font-size: .72rem; font-weight: var(--weight-black); letter-spacing: .12em; text-transform: uppercase; color: var(--ink-soft); }
.player-chip-name { font-size: .98rem; font-weight: var(--weight-black); color: var(--ink-title); }

/* ═══ MAP ═══ */
.map-wrap {
  max-width: 660px; width: 100%;
  display: flex; flex-direction: column; gap: 22px;
  animation: slideUpSpring .4s ease;
}
.map-header { text-align: center; display: flex; flex-direction: column; gap: 10px; align-items: center; }
.map-greeting {
  font-family: var(--font-ui);
  font-size: clamp(2rem, 6vw, 2.8rem);
  font-weight: var(--weight-black);
  line-height: 1.08; color: var(--ink-title); letter-spacing: -0.04em;
  animation: textPop .5s cubic-bezier(.34,1.56,.64,1);
}
@keyframes textPop {
  from { opacity:0; transform: scale(0.8) translateY(10px); }
  to   { opacity:1; transform: scale(1) translateY(0); }
}
.map-sub { color: var(--ink-muted); font-size: 1.05rem; font-weight: var(--weight-bold); }
.worlds-grid {
  display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px;
}
.world-card {
  border-radius: var(--radius); padding: 22px 20px;
  cursor: pointer; border: 1px solid rgba(255,255,255,0.92);
  text-align: left; position: relative; overflow: hidden;
  transition: transform .25s cubic-bezier(.34,1.56,.64,1), box-shadow .25s;
  background: rgba(255,255,255,0.78);
  transform-style: preserve-3d;
  perspective: 800px;
  animation: worldCardEnter .5s cubic-bezier(.34,1.56,.64,1) backwards;
}
@keyframes worldCardEnter {
  from { opacity: 0; transform: scale(0.75) translateY(30px) rotate(-2deg); }
  to   { opacity: 1; transform: scale(1) translateY(0) rotate(0deg); }
}
.world-card::before {
  content: '';
  position: absolute; inset: 0;
  background: var(--w-grad);
  opacity: 0.10;
  transition: opacity .25s;
}
.world-card::after {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 50%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
  transition: left 0.5s ease;
  pointer-events: none;
}
.world-card:hover::after { left: 160%; }
.world-card:hover { transform: translateY(-8px) scale(1.03); }
.world-card:hover::before { opacity: 0.22; }
.world-card:hover { box-shadow: 0 20px 50px var(--w-glow), 0 0 0 2px var(--w-color); }
.world-card:active { transform: scale(0.97); transition-duration: .1s; }
.world-card.full-width { grid-column: 1 / -1; }
.world-card-shine {
  position: absolute; top: -40px; right: -40px;
  width: 160px; height: 160px; border-radius: 50%;
  background: radial-gradient(circle, rgba(255,255,255,0.6) 0%, transparent 70%);
  pointer-events: none;
  animation: shineRotate 5s linear infinite;
}
@keyframes shineRotate {
  0%   { transform: rotate(0deg) translateX(10px); }
  100% { transform: rotate(360deg) translateX(10px); }
}
.world-card-icon-img {
  width: 52px; height: 52px; object-fit: contain;
  display: block; margin-bottom: 8px; position: relative; z-index: 1;
  transition: transform .3s cubic-bezier(.34,1.56,.64,1);
  animation: iconFloat 3s ease-in-out infinite;
}
@keyframes iconFloat {
  0%,100% { transform: translateY(0) rotate(-2deg); }
  50%     { transform: translateY(-6px) rotate(2deg); }
}
.world-card:hover .world-card-icon-img { transform: scale(1.3) rotate(-5deg) translateY(-4px); }
.world-card-num {
  font-size: clamp(0.75rem, 3vw, 0.875rem); font-weight: var(--weight-black);
  letter-spacing: .12em; text-transform: uppercase;
  position: relative; z-index: 1; color: var(--w-color);
}
.world-card-title {
  font-size: clamp(1.25rem, 5vw, 1.5rem); font-weight: var(--weight-black);
  line-height: 1.12; margin-top: 4px; position: relative; z-index: 1;
  color: var(--ink-title);
}
.world-card-hook {
  font-size: clamp(0.9375rem, 4vw, 1.125rem); font-weight: var(--weight-bold);
  line-height: 1.35; opacity: 1; margin-top: 6px;
  position: relative; z-index: 1; color: var(--ink-muted);
}
.world-card-stars { display: flex; gap: 4px; margin-top: 12px; position: relative; z-index: 1; }
.world-card-star-img {
  width: 22px; height: 22px; object-fit: contain;
  transition: filter .3s, transform .3s;
}
.world-card-star-img.lit { transform: scale(1.25); animation: starTwinkle 1.5s ease-in-out infinite alternate; }
@keyframes starTwinkle {
  from { filter: drop-shadow(0 0 4px currentColor); }
  to   { filter: drop-shadow(0 0 10px currentColor) brightness(1.2); }
}

}

}
@keyframes correctMegaPop {
  0%   { transform: scale(1); }
  30%  { transform: scale(1.12) rotate(2deg); }
  55%  { transform: scale(0.97) rotate(-1deg); }
  75%  { transform: scale(1.05) rotate(0.5deg); }
  100% { transform: scale(1) rotate(0deg); }
}
.opt-btn.wrong {
  background: rgba(220,38,38,0.12); border-color: #dc2626; color: #b91c1c;

  box-shadow: 0 0 24px rgba(220,38,38,0.3);
}
@keyframes wrongShake {
  0%,100% { transform: translateX(0) rotate(0deg); }
  15%     { transform: translateX(-12px) rotate(-3deg); }
  30%     { transform: translateX(12px) rotate(3deg); }
  45%     { transform: translateX(-8px) rotate(-2deg); }
  60%     { transform: translateX(8px) rotate(2deg); }
  75%     { transform: translateX(-4px) rotate(-1deg); }
  88%     { transform: translateX(4px) rotate(1deg); }
}
.opt-btn:disabled { cursor: default; }
.q-feedback {
  margin: 0 20px 20px; border-radius: 16px; padding: 16px 18px;

}
@keyframes feedbackEntrance {
  from { opacity: 0; transform: scale(0.7) translateY(10px); }

}
.q-feedback::after {
  content: '';

  width: 50%; height: 100%;

}
.q-feedback.good { background: rgba(22,163,74,0.12); color: #15803d; border: 1.5px solid rgba(22,163,74,0.35); }

@keyframes starMegaPop {

.wend-actions {

.img-btn {

<script type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

/* ───── DATA ───── */
const GAME_DATA = {
  sections: [
    {
      id:"section-1", title:"Mundo 1", subtitle:"Detective de los sentidos",

function rand(arr) { return arr[Math.floor(Math.random()*arr.length)]; }
function shuffle(arr) { return [...arr].sort(()=>Math.random()-.5); }
function displayOpt(o) {
  if(o==='V') return '✓ Verdadero';
  if(o==='F') return '✗ Falso';
  return o;
}
function calcStars(correct) {
  if(correct===5) return 3;
  if(correct>=3) return 2;
  if(correct>=1) return 1;
  return 0;
}
function drawRound(section, seenMap) {
  const qs=[];
  for(const bucket of section.draw_plan) {
    const pool = section.pools[bucket];
    if(!pool||pool.length===0) continue;
    const seenIds = (seenMap[section.id]||{})[bucket]||[];
    const avail = pool.filter(q=>!seenIds.includes(q.id));
    const src = avail.length>0 ? avail : pool;
    qs.push({ ...rand(src), bucketName:bucket });
  }
  return qs;
}
function updateSeen(seenMap, worldId, questions) {
  const worldSeen = { ...(seenMap[worldId]||{}) };
  for(const q of questions) {
    const prev = worldSeen[q.bucketName]||[];
    if(!prev.includes(q.id)) worldSeen[q.bucketName] = [...prev, q.id];
  }
  return { ...seenMap, [worldId]: worldSeen };
}
function findCharacter(id) { return CHARACTER_OPTIONS.find(c=>c.id===id)||CHARACTER_OPTIONS[0]; }
function wStyle(w) { return { '--w-color': w.color, '--w-glow': w.glow, '--w-grad': w.grad }; }

/* ───── BUBBLE FIELD ───── */
function BubbleField() {
  const bubbles = useMemo(()=>{
    const colors = ['#ff4dc4','#9b5dff','#00e5ff','#39ff6e','#ffe234','#ff7b2c','#0099bb','#ff0066'];
    const b = [];
    for(let i=0;i<22;i++) {
      b.push({
        id:i, x:Math.random()*100,
        size: 30+Math.random()*200,
        color:colors[Math.floor(Math.random()*colors.length)],
        dur:10+Math.random()*18,
        delay:-(Math.random()*28),
        op:0.05+Math.random()*0.08
      });
    }
    return b;
  },[]);
  return (
    <div className="bubblefield">
      {bubbles.map(b=>(
        <div key={b.id} className="bubble" style={{
          left:`${b.x}%`, width:b.size, height:b.size,
          background:`radial-gradient(circle at 35% 35%, rgba(255,255,255,0.4), ${b.color})`,
          '--dur':`${b.dur}s`, '--delay':`${b.delay}s`, '--op':b.op,
          marginLeft:-b.size/2,
          boxShadow:`0 0 ${b.size*0.3}px ${b.color}33`
        }}/>
      ))}
    </div>
  );
}

/* ───── APP ───── */
function App() {
  const [screen,       setScreen]       = useState('welcome');
  const [name,         setName]         = useState('');
  const [selectedChar, setSelectedChar] = useState(()=>localStorage.getItem('cn-selected-character')||CHARACTER_OPTIONS[0].id);
  const [worldIdx,     setWorldIdx]     = useState(null);
  const [questions,    setQuestions]    = useState([]);
  const [qIdx,         setQIdx]         = useState(0);
  const [correctCount, setCorrectCount] = useState(0);
  const [feedback,     setFeedback]     = useState(null);
  const [selectedOpt,  setSelectedOpt]  = useState(null);
  const [shaking,      setShaking]      = useState(false);
  const [reactionImg,  setReactionImg]  = useState(null);
  const [retryMsg,     setRetryMsg]     = useState('');
  const [finalStars,   setFinalStars]   = useState(0);
  const [worldStars,   setWorldStars]   = useState(()=>{
    try { return JSON.parse(localStorage.getItem('cn-world-stars'))||[0,0,0,0,0]; }
    catch { return [0,0,0,0,0]; }
  });
  const [particles,    setParticles]    = useState([]);
  const [confetti,     setConfetti]     = useState([]);
  const [flashColor,   setFlashColor]   = useState(null);
  const [flashActive,  setFlashActive]  = useState(false);
  const [shockwave,    setShockwave]    = useState({ active:false, x:0, y:0, color:'#fff' });

  const seenRef       = useRef({});
  const pIdRef        = useRef(0);
  const correctRef    = useRef(0);
  const retryTimerRef = useRef(null);
  const reactTimerRef = useRef(null);
  const autoNextTimerRef = useRef(null);
  const autoSelectTimerRef = useRef(null);
  const flashTimerRef = useRef(null);
  const shockTimerRef = useRef(null);
  const bgMusicRef    = useRef(null);
  const buttonSfxRef  = useRef(null);
  const clearSfxRef   = useRef(null);
  const errorSfxRef   = useRef(null);
  const levelSfxRef   = useRef(null);
  const musicReadyRef = useRef(false);
  const musicStartPendingRef = useRef(false);
  const activeCharacter = findCharacter(selectedChar);

  function playAudio(audioRef, { reset=true } = {}) {
    const audio = audioRef.current;
    if(!audio) return;
    try {
      if(reset) audio.currentTime = 0;
      return audio.play();
    } catch {}
    return null;
  }

  function ensureBackgroundMusic() {
    const audio = bgMusicRef.current;
    if(!audio) return Promise.resolve(false);
    if(!audio.paused && !audio.ended) {
      musicReadyRef.current = true;
      return Promise.resolve(true);
    }
    if(musicStartPendingRef.current) return Promise.resolve(false);
    musicStartPendingRef.current = true;
    const playPromise = playAudio(bgMusicRef, { reset:false });
    if(playPromise && typeof playPromise.then === 'function') {
      return playPromise
        .then(()=>{
          musicReadyRef.current = !audio.paused;
          return musicReadyRef.current;
        })
        .catch(()=>{
          musicReadyRef.current = false;
          return false;
        })
        .finally(()=>{
          musicStartPendingRef.current = false;
        });
    }
    musicReadyRef.current = !audio.paused;
    musicStartPendingRef.current = false;
    return Promise.resolve(musicReadyRef.current);
  }

  useEffect(()=>{
    bgMusicRef.current = new Audio('SONIDOS/GAME MUSIC.mp3');
    bgMusicRef.current.loop = true;
    bgMusicRef.current.volume = 0.28;
    bgMusicRef.current.preload = 'auto';

    buttonSfxRef.current = new Audio('SONIDOS/BUTTON PRESS.mp3');
    buttonSfxRef.current.volume = 0.62;
    buttonSfxRef.current.preload = 'auto';

    clearSfxRef.current = new Audio('SONIDOS/CLEAR.mp3');
    clearSfxRef.current.volume = 0.72;
    clearSfxRef.current.preload = 'auto';

    errorSfxRef.current = new Audio('SONIDOS/ERROR.mp3');
    errorSfxRef.current.volume = 0.78;
    errorSfxRef.current.preload = 'auto';

    levelSfxRef.current = new Audio('SONIDOS/LEVEL PASSED.mp3');
    levelSfxRef.current.volume = 0.8;
    levelSfxRef.current.preload = 'auto';

    [bgMusicRef, buttonSfxRef, clearSfxRef, errorSfxRef, levelSfxRef].forEach(ref=>{
      if(ref.current && typeof ref.current.load === 'function') ref.current.load();
    });

    const removeUnlockListeners = () => {
      document.removeEventListener('pointerdown', handleFirstInteraction, true);
      document.removeEventListener('touchstart', handleFirstInteraction, true);
      document.removeEventListener('click', handleFirstInteraction, true);
      document.removeEventListener('keydown', handleFirstInteraction, true);
    };
    const handleFirstInteraction = () => {
      ensureBackgroundMusic().then(started=>{
        if(started) removeUnlockListeners();
      });
    };
    const handleButtonSound = (event) => {
      const target = event.target instanceof Element ? event.target.closest('button') : null;
      if(!target) return;
      ensureBackgroundMusic();
      const playPromise = playAudio(buttonSfxRef);
      if(playPromise && typeof playPromise.catch === 'function') playPromise.catch(()=>{});
    };

    document.addEventListener('pointerdown', handleFirstInteraction, true);
    document.addEventListener('touchstart', handleFirstInteraction, true);
    document.addEventListener('click', handleFirstInteraction, true);
    document.addEventListener('keydown', handleFirstInteraction, true);
    document.addEventListener('click', handleButtonSound, true);

    return ()=>{
      removeUnlockListeners();
      document.removeEventListener('click', handleButtonSound, true);
      [bgMusicRef, buttonSfxRef, clearSfxRef, errorSfxRef, levelSfxRef].forEach(ref=>{
        if(!ref.current) return;
        ref.current.pause();
        ref.current.src = '';
        ref.current = null;
      });
    };
  }, []);

  useEffect(()=>()=> {
    if(retryTimerRef.current) clearTimeout(retryTimerRef.current);
    if(reactTimerRef.current) clearTimeout(reactTimerRef.current);
    if(autoNextTimerRef.current) clearTimeout(autoNextTimerRef.current);
    if(autoSelectTimerRef.current) clearTimeout(autoSelectTimerRef.current);
    if(flashTimerRef.current) clearTimeout(flashTimerRef.current);
    if(shockTimerRef.current) clearTimeout(shockTimerRef.current);
  }, []);

  /* flash */
  function triggerFlash(color) {
    setFlashColor(color);
    setFlashActive(true);
    if(flashTimerRef.current) clearTimeout(flashTimerRef.current);
    flashTimerRef.current = setTimeout(()=>setFlashActive(false), 550);
  }

  /* shockwave */
  function triggerShockwave(x, y, color) {
    if(shockTimerRef.current) clearTimeout(shockTimerRef.current);
    setShockwave({ active:true, x, y, color });
    shockTimerRef.current = setTimeout(()=>setShockwave(s=>({...s, active:false})), 900);
  }

  /* reaction */
  function showReaction(type) {
    if(reactTimerRef.current) clearTimeout(reactTimerRef.current);
    setReactionImg(type);
    reactTimerRef.current = setTimeout(()=>setReactionImg(null), type==='correcto'?1400:1700);
  }

  /* big burst: particles + confetti */
  function megaBurst(cx, cy, wColor) {
    const ps = [];
    const count = 70;
    for(let i=0;i<count;i++) {
      const angle = (i/count)*Math.PI*2 + Math.random()*0.4;
      const dist  = 80 + Math.random()*280;
      const speed = 0.5 + Math.random()*0.35;
      const isStarShape = Math.random()>0.75;
      const isSquare    = !isStarShape && Math.random()>0.6;
      ps.push({
        id: pIdRef.current++,
        x: cx-8, y: cy-8,
        size: 8+Math.random()*18,
        color: Math.random()>0.3 ? rand(BURST_COLORS) : wColor,
        tx: `${Math.cos(angle)*dist}px`,
        ty: `${Math.sin(angle)*dist}px`,
        dur: `${speed}s`,
        square: isSquare, star: isStarShape,
        rot: Math.floor(Math.random()*720)
      });
    }
    setParticles(ps);
    setTimeout(()=>setParticles([]), 900);

    /* confetti from top */
    const cpieces = [];
    for(let i=0;i<55;i++) {
      const isCircle = Math.random()>0.6;
      cpieces.push({
        id: pIdRef.current++,
        x: Math.random()*window.innerWidth,
        y: -20 - Math.random()*80,
        w: isCircle ? 10+Math.random()*10 : 8+Math.random()*14,
        h: isCircle ? 10+Math.random()*10 : 4+Math.random()*8,
        color: rand(BURST_COLORS),
        dur: 0.9+Math.random()*0.9,
        delay: Math.random()*0.4,
        ty: 400+Math.random()*400,
        tx: -120+Math.random()*240,
        rot: 180+Math.floor(Math.random()*900),
        circle: isCircle
      });
    }
    setConfetti(cpieces);
    setTimeout(()=>setConfetti([]), 2000);
  }

  function handleStart(n) { setName(n); setScreen('select'); }
  function handleChooseChar(id) {
    setSelectedChar(id);
    localStorage.setItem('cn-selected-character', id);
    if(autoSelectTimerRef.current) clearTimeout(autoSelectTimerRef.current);
    autoSelectTimerRef.current = setTimeout(()=>{
      setScreen('map');
    }, 180);
  }
  function handleSelectWorld(i) { setWorldIdx(i); setScreen('intro'); }
  function handlePlayWorld() {
    if(retryTimerRef.current) clearTimeout(retryTimerRef.current);
    if(reactTimerRef.current) clearTimeout(reactTimerRef.current);
    if(autoNextTimerRef.current) clearTimeout(autoNextTimerRef.current);
    correctRef.current = 0;
    const sec = GAME_DATA.sections[worldIdx];
    const qs = drawRound(sec, seenRef.current);
    seenRef.current = updateSeen(seenRef.current, sec.id, qs);
    setQuestions(shuffle(qs.map(q=>({...q, options:shuffle(q.options)}))));
    setQIdx(0); setCorrectCount(0); setFeedback(null); setSelectedOpt(null);
    setShaking(false); setReactionImg(null); setRetryMsg(''); setFinalStars(0);
    setScreen('question');
  }

  function handleAnswer(opt) {
    if(feedback) return;
    const q = questions[qIdx];
    const correct = opt===q.answer;
    setSelectedOpt(opt);
    setFeedback(correct?'correct':'wrong');
    const cx = window.innerWidth/2, cy = window.innerHeight*0.42;
    if(correct) {
      correctRef.current += 1;
      setCorrectCount(correctRef.current);
      playAudio(clearSfxRef);
      const wColor = worldIdx!=null ? WORLDS[worldIdx].color : '#ff4dc4';
      megaBurst(cx, cy, wColor);
      triggerFlash(`radial-gradient(circle at 50% 42%, ${wColor}66, transparent 70%)`);
      triggerShockwave(cx, cy*0.95, wColor);
      showReaction('correcto');
      if(autoNextTimerRef.current) clearTimeout(autoNextTimerRef.current);
      autoNextTimerRef.current = setTimeout(()=>{
        handleNext();
      }, 950);
    } else {
      playAudio(errorSfxRef);
      setRetryMsg(rand(RETRY_MSGS));
      triggerFlash('rgba(220,38,38,0.22)');
      showReaction('fallo');
      setShaking(true);
      retryTimerRef.current = setTimeout(()=>{
        setFeedback(null); setSelectedOpt(null);
        setShaking(false); setRetryMsg('');
      }, 1900);
    }
  }

  function handleNext() {
    if(autoNextTimerRef.current) {
      clearTimeout(autoNextTimerRef.current);
      autoNextTimerRef.current = null;
    }
    if(qIdx < questions.length-1) {
      setQIdx(i=>i+1); setFeedback(null); setSelectedOpt(null);
    } else {
      const stars = calcStars(correctRef.current);
      playAudio(levelSfxRef);
      setFinalStars(stars);
      const newStars = [...worldStars];
      newStars[worldIdx] = Math.max(newStars[worldIdx]||0, stars);
      setWorldStars(newStars);
      localStorage.setItem('cn-world-stars', JSON.stringify(newStars));
      /* victory burst */
      const cx=window.innerWidth/2, cy=window.innerHeight/2;
      const wColor = WORLDS[worldIdx].color;
      megaBurst(cx,cy,wColor);
      triggerFlash(`radial-gradient(circle, ${wColor}88, transparent)`);
      setTimeout(()=>{ megaBurst(cx*0.6, cy*0.7, rand(BURST_COLORS)); }, 300);
      setTimeout(()=>{ megaBurst(cx*1.4, cy*0.8, rand(BURST_COLORS)); }, 500);
      setScreen('worldend');
    }
  }

  function handleMap() {
    const done = worldStars.every(s=>s>0);
    if(done) {
      /* final celebration */
      const cx=window.innerWidth/2, cy=window.innerHeight/2;
      for(let i=0;i<4;i++) setTimeout(()=>megaBurst(Math.random()*window.innerWidth, Math.random()*cy, rand(BURST_COLORS)), i*200);
    }
    setScreen(done?'final':'map');
  }

  function handleRestart() {
    const fresh=[0,0,0,0,0];
    setWorldStars(fresh);
    localStorage.setItem('cn-world-stars', JSON.stringify(fresh));
    seenRef.current={};
    setScreen('map');
  }

  return (
    <>
      <BubbleField/>
      <SparkleField/>
      <ScreenFlash color={flashColor} active={flashActive}/>
      {shockwave.active && <ShockwaveRings x={shockwave.x} y={shockwave.y} color={shockwave.color} active/>}
      <div className="app">
        {screen==='welcome'  && <WelcomeScreen onStart={handleStart}/>}
        {screen==='select'   && <SelectScreen name={name} selectedCharacter={selectedChar} onSelectCharacter={handleChooseChar} onBack={()=>setScreen('welcome')}/>}
        {screen==='map'      && <MapScreen name={name} worldStars={worldStars} character={activeCharacter} onSelect={handleSelectWorld}/>}
        {screen==='intro'    && <IntroScreen worldIdx={worldIdx} name={name} onPlay={handlePlayWorld} onBack={()=>setScreen('map')}/>}
        {screen==='question' && <QuestionScreen worldIdx={worldIdx} questions={questions} qIdx={qIdx} name={name} feedback={feedback} selectedOpt={selectedOpt} shaking={shaking} retryMsg={retryMsg} onAnswer={handleAnswer}/>}
        {screen==='worldend' && <WorldEndScreen worldIdx={worldIdx} name={name} correctCount={correctRef.current} stars={finalStars} character={activeCharacter} onReplay={handlePlayWorld} onMap={handleMap}/>}
        {screen==='final'    && <FinalScreen name={name} worldStars={worldStars} character={activeCharacter} onRestart={handleRestart}/>}
      </div>
      <Particles particles={particles}/>
      <Confetti pieces={confetti}/>
      <ReactionOverlay img={reactionImg}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
