<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Game System Starter</title>
  <style>
    :root {
      --bg-deep: #10233b;
      --bg-mid: #1b3f67;
      --bg-glow: rgba(255, 216, 111, 0.24);
      --panel: rgba(8, 23, 41, 0.76);
      --panel-border: rgba(255, 255, 255, 0.16);
      --text-main: #f5fbff;
      --text-soft: rgba(245, 251, 255, 0.82);
      --accent-a: #ffd86f;
      --accent-b: #ff84c9;
      --accent-c: #79f1ff;
      --success: #8bf2b4;
      --danger: #ff9aab;
      --shadow-xl: 0 28px 70px rgba(0, 0, 0, 0.28);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      font-family: "Trebuchet MS", sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at 18% 18%, var(--bg-glow), transparent 18%),
        radial-gradient(circle at 84% 12%, rgba(121, 241, 255, 0.22), transparent 20%),
        linear-gradient(160deg, var(--bg-mid), var(--bg-deep));
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 14% 70%, rgba(255, 255, 255, 0.10), transparent 12%),
        radial-gradient(circle at 76% 80%, rgba(255, 255, 255, 0.08), transparent 10%);
      mix-blend-mode: screen;
    }

    button {
      border: 0;
      cursor: pointer;
      font: inherit;
    }

    .app-shell {
      min-height: 100vh;
      padding: 18px;
      display: grid;
      place-items: center;
    }

    .stage {
      width: min(1180px, 100%);
      height: min(860px, calc(100vh - 36px));
      position: relative;
      overflow: hidden;
      border-radius: 34px;
      border: 1px solid var(--panel-border);
      box-shadow: var(--shadow-xl);
      background: rgba(7, 19, 34, 0.56);
      backdrop-filter: blur(16px);
    }

    .screen {
      display: none;
      width: 100%;
      height: 100%;
      padding: 74px 24px 24px;
      position: relative;
    }

    .screen.active {
      display: grid;
      gap: 18px;
      align-content: start;
      animation: fadeIn 220ms ease;
    }

    .topbar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 64px;
      padding: 0 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: linear-gradient(180deg, rgba(7, 19, 34, 0.94), rgba(7, 19, 34, 0.60), transparent);
      z-index: 10;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand-badge {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      color: #072031;
      background: linear-gradient(135deg, var(--accent-a), var(--accent-c));
      font-weight: 900;
    }

    .brand-copy strong,
    .screen h1,
    .screen h2,
    .helper-name,
    .victory-title {
      font-family: var(--display-font, "Trebuchet MS"), sans-serif;
      letter-spacing: 0.02em;
    }

    .brand-copy span {
      display: block;
      color: var(--text-soft);
      font-size: 0.85rem;
    }

    .stats {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .pill {
      min-height: 40px;
      padding: 8px 14px;
      border-radius: 999px;
      color: var(--text-main);
      background: rgba(255, 255, 255, 0.10);
      border: 1px solid var(--panel-border);
      font-weight: 800;
    }

    .panel,
    .hero-panel,
    .choice-card,
    .helper-card,
    .map-card,
    .victory-card,
    .memory-card {
      border-radius: var(--radius-xl);
      border: 1px solid var(--panel-border);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.10), rgba(255, 255, 255, 0.04));
      box-shadow: var(--shadow-xl);
      backdrop-filter: blur(10px);
    }

    .hero-panel,
    .panel,
    .victory-card {
      padding: 26px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.10);
      color: var(--accent-a);
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      width: fit-content;
    }

    .hero-panel h1 {
      margin: 10px 0 8px;
      font-size: clamp(2.6rem, 6vw, 5rem);
      line-height: 0.95;
    }

    .hero-panel p,
    .panel p,
    .status-line,
    .subcopy {
      margin: 0;
      color: var(--text-soft);
      line-height: 1.35;
    }

    .action-row,
    .choice-grid,
    .helper-grid,
    .map-grid,
    .memory-grid {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .primary-btn,
    .secondary-btn,
    .choice-card,
    .helper-card,
    .map-card,
    .memory-card {
      transition: transform 180ms ease, box-shadow 180ms ease, filter 180ms ease;
    }

    .primary-btn:hover,
    .secondary-btn:hover,
    .choice-card:hover,
    .helper-card:hover,
    .map-card:hover,
    .memory-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.24);
      filter: brightness(1.04);
    }

    .primary-btn,
    .secondary-btn {
      min-height: 52px;
      padding: 12px 20px;
      border-radius: 999px;
      font-weight: 800;
    }

    .primary-btn {
      color: #072031;
      background: linear-gradient(135deg, var(--accent-a), var(--accent-b), var(--accent-c));
    }

    .secondary-btn {
      color: var(--text-main);
      background: rgba(255, 255, 255, 0.10);
      border: 1px solid var(--panel-border);
    }

    .layout-two {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 18px;
      min-height: 0;
    }

    .helper-grid,
    .map-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }

    .helper-card,
    .map-card,
    .choice-card {
      min-height: 132px;
      padding: 18px;
      color: var(--text-main);
      text-align: left;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0.05));
    }

    .helper-card.active,
    .map-card.active {
      outline: 2px solid rgba(255, 255, 255, 0.5);
    }

    .helper-role,
    .map-status,
    .choice-sub {
      color: var(--text-soft);
      display: block;
      margin-top: 6px;
    }

    .progress-shell {
      height: 12px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.10);
    }

    .progress-fill {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--accent-a), var(--accent-b), var(--accent-c));
      transition: width 220ms ease;
    }

    .question-card {
      padding: 22px;
    }

    .question-card h2 {
      margin: 0 0 8px;
      font-size: clamp(1.6rem, 2.8vw, 2.3rem);
    }

    .choice-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .choice-card.correct,
    .memory-card.correct {
      background: linear-gradient(145deg, rgba(139, 242, 180, 0.30), rgba(255, 255, 255, 0.08));
    }

    .choice-card.wrong,
    .memory-card.wrong {
      background: linear-gradient(145deg, rgba(255, 154, 171, 0.26), rgba(255, 255, 255, 0.06));
    }

    .memory-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .memory-card {
      min-height: 120px;
      padding: 14px;
      display: grid;
      place-items: center;
      font-weight: 900;
      color: var(--text-main);
    }

    .sequence-bank,
    .sequence-built {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .sequence-chip {
      min-height: 42px;
      padding: 10px 14px;
      border-radius: 999px;
      color: var(--text-main);
      background: rgba(255, 255, 255, 0.10);
      border: 1px solid var(--panel-border);
    }

    .feedback-banner {
      min-height: 54px;
      padding: 14px 16px;
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-main);
    }

    .feedback-banner.good {
      background: linear-gradient(135deg, rgba(139, 242, 180, 0.28), rgba(255, 255, 255, 0.08));
    }

    .feedback-banner.bad {
      background: linear-gradient(135deg, rgba(255, 154, 171, 0.24), rgba(255, 255, 255, 0.08));
    }

    .toast-layer {
      position: absolute;
      right: 18px;
      bottom: 18px;
      z-index: 20;
      display: grid;
      gap: 8px;
    }

    .toast {
      min-width: 220px;
      padding: 12px 14px;
      border-radius: 18px;
      color: #072031;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent-a), var(--accent-c));
      animation: slideUp 220ms ease;
    }

    .burst-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .burst {
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: var(--accent-a);
      animation: burst 650ms ease-out forwards;
    }

    .victory-card {
      max-width: 720px;
    }

    .victory-title {
      margin: 10px 0 8px;
      font-size: clamp(2.2rem, 4vw, 3.4rem);
    }

    .preset-note {
      position: absolute;
      left: 18px;
      bottom: 18px;
      z-index: 5;
      padding: 10px 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-soft);
    }

    .intense .stage {
      box-shadow: 0 36px 90px rgba(0, 0, 0, 0.42);
    }

    .intense .brand-badge,
    .intense .primary-btn,
    .intense .toast {
      background: linear-gradient(135deg, var(--accent-b), var(--accent-c), var(--accent-a));
    }

    .intense .screen {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent 32%),
        radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.12), transparent 30%);
    }

    @media (max-width: 920px) {
      .layout-two,
      .choice-grid,
      .memory-grid {
        grid-template-columns: 1fr;
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes burst {
      from { opacity: 1; transform: translate(0, 0) scale(1); }
      to { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.3); }
    }
  </style>
</head>
<body>

          {

          }
        ],
        assets: {

          portraits: [],
          backgrounds: [],
          audio: { bgm: [], sfx: {} },
          fallbacks: { avatarText: "HX" }
        },
        futureContent: {

          drawMissions: []
        }
      }
    };

    const ACTIVE_CONFIG = DEMO_PRESETS.softMap;

    const APP = {
      config: null,
      screen: "landing",
      score: 0,
      stars: 0,
      combo: 0,
      completed: 0,
      questionIndex: 0,
      feedbackText: "",
      feedbackType: "",
      selectedHelperId: null,
      selectedMapNodeId: null,
      memoryState: null,
      sequenceState: null
    };

    const GENERIC_CHOICE_MECHANICS = new Set([
      "photo-word",
      "word-photo",
      "listen",
      "cantinela",
      "train",
      "fingersum",
      "plusjump"
    ]);

    function shuffle(values) {
      return [...values].sort(() => Math.random() - 0.5);
    }

    function deepClone(value) {
      return JSON.parse(JSON.stringify(value));
    }

    function validateConfig(config) {
      const screens = config.flow?.activeScreens || [];
      if (!screens.includes("landing") || !screens.includes("game") || !screens.includes("victory")) {
        throw new Error("Config must include landing, game, and victory screens.");
      }
      screens.forEach((screen) => {
        if (!SUPPORTED_SCREENS.includes(screen)) {
          throw new Error(`Unsupported screen: ${screen}`);
        }
      });
      (config.mechanics || []).forEach((item) => {
        if (!SUPPORTED_MECHANICS.includes(item.mechanicId)) {
          throw new Error(`Unsupported mechanic: ${item.mechanicId}`);
        }
      });
      if (!config.progression?.storage?.namespace) {
        throw new Error("Config must define progression.storage.namespace");
      }
    }

    function applyTheme(config) {
      const root = document.documentElement;
      const tokens = config.theme.tokens;
      root.style.setProperty("--bg-deep", tokens.bgDeep);
      root.style.setProperty("--bg-mid", tokens.bgMid);
      root.style.setProperty("--bg-glow", tokens.bgGlow);
      root.style.setProperty("--panel", tokens.panel || "rgba(8, 23, 41, 0.76)");
      root.style.setProperty("--accent-a", tokens.accentA);
      root.style.setProperty("--accent-b", tokens.accentB);
      root.style.setProperty("--accent-c", tokens.accentC);
      root.style.setProperty("--text-main", tokens.textMain);
      root.style.setProperty("--text-soft", tokens.textSoft);
      root.style.setProperty("--display-font", config.theme.fonts?.display || "'Trebuchet MS'");
      document.body.classList.toggle("intense", config.theme.tone === "intense");
    }

    function storageKey(name) {
      return `${APP.config.progression.storage.namespace}:${name}`;
    }

    function saveProgress() {
      const keys = APP.config.progression.storage.keys;
      localStorage.setItem(storageKey(keys.score || "score"), String(APP.score));
      localStorage.setItem(storageKey(keys.stars || "stars"), String(APP.stars));
      localStorage.setItem(storageKey(keys.lastScreen || "lastScreen"), APP.screen);
    }

    function loadProgress() {
      const keys = APP.config.progression.storage.keys;
      APP.score = Number(localStorage.getItem(storageKey(keys.score || "score")) || 0);
      APP.stars = Number(localStorage.getItem(storageKey(keys.stars || "stars")) || 0);
    }

    function activeQuestion() {
      return APP.config.mechanics[APP.questionIndex];
    }

    function setScreen(screen) {
      APP.screen = screen;
      saveProgress();
      render();
    }

    function nextPreGameScreen() {
      const screens = APP.config.flow.activeScreens;
      if (screens.includes("briefing")) return "briefing";
      if (screens.includes("select")) return "select";
      if (screens.includes("map")) return "map";
      return "game";
    }

    function startExperience() {
      APP.score = 0;
      APP.stars = 0;
      APP.combo = 0;
      APP.completed = 0;
      APP.questionIndex = 0;
      APP.feedbackText = "";
      APP.feedbackType = "";
      APP.memoryState = null;
      APP.sequenceState = null;
      setScreen(nextPreGameScreen());
    }

    function startGame() {
      APP.feedbackText = "Make the next move.";
      APP.feedbackType = "";
      APP.memoryState = null;
      APP.sequenceState = null;
      setScreen("game");
    }

    function finishRound() {
      APP.feedbackText = APP.config.feedback.victory.summary;
      APP.feedbackType = "good";
      setScreen("victory");
      showToast(APP.config.feedback.victory.title);
      launchBurst(window.innerWidth * 0.6, window.innerHeight * 0.35);
    }

    function advanceAfterCorrect() {
      APP.completed += 1;
      APP.questionIndex += 1;
      APP.memoryState = null;
      APP.sequenceState = null;
      if (APP.questionIndex >= APP.config.progression.roundLength || APP.questionIndex >= APP.config.mechanics.length) {
        finishRound();
        return;
      }
      render();
    }

    function pickLine(list) {
      return list[Math.floor(Math.random() * list.length)];
    }

    function registerCorrect(message) {
      APP.score += APP.config.progression.scorePerCorrect;
      APP.stars += APP.config.progression.starStep || 0;
      if (APP.config.progression.comboEnabled) APP.combo += 1;
      APP.feedbackText = message || pickLine(APP.config.feedback.praiseLines);
      APP.feedbackType = "good";
      showToast(APP.feedbackText);
      launchBurst(window.innerWidth * 0.64, window.innerHeight * 0.44);
      saveProgress();
      setTimeout(advanceAfterCorrect, 550);
    }

    function registerWrong(message) {
      if (APP.config.progression.comboEnabled) APP.combo = 0;
      APP.feedbackText = message || pickLine(APP.config.feedback.retryLines);
      APP.feedbackType = "bad";
      showToast(APP.feedbackText);
      saveProgress();
      render();
    }

    function answerChoice(optionId) {
      const question = activeQuestion();
      const correct = optionId === question.answer;
      if (correct) {
        registerCorrect();
      } else {
        registerWrong();
      }
    }

    function answerTrueFalse(value) {
      const question = activeQuestion();
      const correct = Boolean(value) === Boolean(question.answer);
      if (correct) {
        registerCorrect();
      } else {
        registerWrong();
      }
    }

    function initMemoryState(question) {
      if (APP.memoryState) return;
      const cards = shuffle(question.pairs.flatMap((pair) => ([
        { id: `${pair.id}-left`, pairId: pair.id, label: pair.left },
        { id: `${pair.id}-right`, pairId: pair.id, label: pair.right }
      ])));
      APP.memoryState = { cards, revealed: [], matched: [] };
    }

    function flipMemoryCard(cardId) {
      const state = APP.memoryState;
      if (!state) return;
      if (state.revealed.includes(cardId) || state.matched.includes(cardId)) return;
      if (state.revealed.length === 2) return;
      state.revealed.push(cardId);
      render();
      if (state.revealed.length < 2) return;

      const [firstId, secondId] = state.revealed;
      const first = state.cards.find((card) => card.id === firstId);
      const second = state.cards.find((card) => card.id === secondId);
      if (first.pairId === second.pairId && first.id !== second.id) {
        state.matched.push(firstId, secondId);
        state.revealed = [];
        if (state.matched.length === state.cards.length) {
          registerCorrect("Full memory chain!");
        } else {
          render();
        }
        return;
      }

      setTimeout(() => {
        state.revealed = [];
        registerWrong("Flip and try again.");
      }, 420);
    }

    function initSequenceState(question) {
      if (APP.sequenceState) return;
      APP.sequenceState = {
        built: [],
        bank: shuffle(question.steps)
      };
    }

    function pushSequenceStep(step) {
      const state = APP.sequenceState;
      if (!state) return;
      if (!state.bank.includes(step)) return;
      state.bank = state.bank.filter((item) => item !== step);
      state.built.push(step);
      render();
    }

    function resetSequence() {
      APP.sequenceState = null;
      render();
    }

    function submitSequence() {
      const question = activeQuestion();
      const built = APP.sequenceState?.built || [];
      const correct = JSON.stringify(built) === JSON.stringify(question.answer);
      if (correct) {
        registerCorrect("Sequence restored!");
      } else {
        registerWrong("That order is not stable yet.");
        resetSequence();
      }
    }

    function selectHelper(helperId) {
      APP.selectedHelperId = helperId;
      render();
    }

    function focusMapNode(nodeId) {
      APP.selectedMapNodeId = nodeId;
      render();
    }

    function helperName() {
      return APP.config.helpers.find((item) => item.id === APP.selectedHelperId)?.name || APP.config.meta.playerRole;
    }

    function showToast(text) {
      const toastLayer = document.getElementById("toastLayer");
      const toast = document.createElement("div");
      toast.className = "toast";
      toast.textContent = text;
      toastLayer.appendChild(toast);
      setTimeout(() => toast.remove(), 1800);
    }

    function launchBurst(x, y) {
      const burstLayer = document.getElementById("burstLayer");
      for (let index = 0; index < 10; index += 1) {
        const dot = document.createElement("span");
        dot.className = "burst";
        dot.style.left = `${x}px`;
        dot.style.top = `${y}px`;
        dot.style.setProperty("--tx", `${Math.cos((Math.PI * 2 * index) / 10) * (34 + Math.random() * 28)}px`);
        dot.style.setProperty("--ty", `${Math.sin((Math.PI * 2 * index) / 10) * (34 + Math.random() * 28)}px`);
        dot.style.background = index % 2 ? "var(--accent-b)" : "var(--accent-c)";
        burstLayer.appendChild(dot);
        setTimeout(() => dot.remove(), 650);
      }
    }

    function renderTopbar() {
      const topbar = document.getElementById("topbar");
      const roundLength = Math.min(APP.config.progression.roundLength, APP.config.mechanics.length);
      topbar.innerHTML = `
        <div class="brand">
          <div class="brand-badge">${APP.config.meta.playerRole.slice(0, 1).toUpperCase()}</div>
          <div class="brand-copy">
            <strong>${APP.config.meta.title}</strong>
            <span>${APP.config.meta.subject} · ${helperName()}</span>
          </div>
        </div>
        <div class="stats">
          <span class="pill">Score ${APP.score}</span>
          <span class="pill">Stars ${APP.stars}</span>
          ${APP.config.progression.comboEnabled ? `<span class="pill">Combo ${APP.combo}</span>` : ""}
          <span class="pill">Round ${Math.min(APP.completed + 1, roundLength)}/${roundLength}</span>
        </div>
      `;
    }

    function renderLanding() {
      return `
        <section class="screen active">
          <article class="hero-panel">
            <span class="eyebrow">Mission start</span>
            <h1>${APP.config.meta.title}</h1>
            <p>${APP.config.meta.fantasyWrapper}</p>
            <div class="action-row" style="margin-top:18px">
              <button class="primary-btn" type="button" onclick="startExperience()">Start mission</button>
            </div>
          </article>
          <article class="panel">
            <h2>Starter rules</h2>
            <p>This template is driven by STUDY_GAME_CONFIG. Change content, fantasy, assets, mechanic mix, and intensity before touching the engine structure.</p>
          </article>
        </section>
      `;
    }

    function renderBriefing() {
      return `
        <section class="screen active">
          <article class="panel">
            <span class="eyebrow">Briefing</span>
            <h2>${APP.config.meta.playerRole}</h2>
            <p>${APP.config.meta.subtitle || "Use this optional screen to frame the route before play begins."}</p>
            <div class="action-row" style="margin-top:18px">
              <button class="primary-btn" type="button" onclick="setScreen('map')">Open mission map</button>
              <button class="secondary-btn" type="button" onclick="startGame()">Skip to round</button>
            </div>
          </article>
        </section>
      `;
    }

    function renderSelect() {
      return `
        <section class="screen active">
          <article class="panel">
            <span class="eyebrow">Select helper</span>
            <h2>Choose your partner</h2>
            <p>Use this branch when the page wants avatar energy, role framing, or stronger identity before the round.</p>
          </article>
          <div class="helper-grid">
            ${APP.config.helpers.map((helper) => `
              <button class="helper-card ${APP.selectedHelperId === helper.id ? "active" : ""}" type="button" onclick="selectHelper('${helper.id}')">
                <strong class="helper-name">${helper.name}</strong>
                <span class="helper-role">${helper.role}</span>
              </button>
            `).join("")}
          </div>
          <div class="action-row">
            <button class="primary-btn" type="button" onclick="startGame()">Enter arena</button>
            <button class="secondary-btn" type="button" onclick="setScreen('landing')">Back</button>
          </div>
        </section>
      `;
    }

    function renderMap() {
      return `
        <section class="screen active">
          <article class="panel">
            <span class="eyebrow">Mission map</span>
            <h2>Trace the route</h2>
            <p>Use this branch when the topic benefits from pathing, locations, or concept nodes.</p>
          </article>
          <div class="map-grid">
            ${APP.config.mapNodes.map((node) => `
              <button class="map-card ${APP.selectedMapNodeId === node.id ? "active" : ""}" type="button" onclick="focusMapNode('${node.id}')">
                <strong>${node.label}</strong>
                <span class="map-status">${node.status}</span>
                <span class="map-status">x ${node.x}% · y ${node.y}%</span>
              </button>
            `).join("")}
          </div>
          <div class="action-row">
            <button class="primary-btn" type="button" onclick="startGame()">Start route</button>
            <button class="secondary-btn" type="button" onclick="setScreen('landing')">Back</button>
          </div>
        </section>
      `;
    }

    function renderGenericChoice(question) {
      return `
        <article class="panel question-card">
          <h2>${question.prompt}</h2>
          <p class="subcopy">${question.subtitle || "Choose the best move."}</p>
        </article>
        <div class="choice-grid">
          ${question.options.map((option) => `
            <button class="choice-card" type="button" onclick="answerChoice('${option.id}')">
              <strong>${option.label}</strong>
              <span class="choice-sub">${question.mechanicId}</span>
            </button>
          `).join("")}
        </div>
      `;
    }

    function renderTrueFalse(question) {
      return `
        <article class="panel question-card">
          <h2>${question.prompt}</h2>
          <p class="subcopy">${question.subtitle || "Mission check."}</p>
        </article>
        <div class="choice-grid">
          <button class="choice-card" type="button" onclick="answerTrueFalse(true)">
            <strong>True</strong>
            <span class="choice-sub">Stable</span>
          </button>
          <button class="choice-card" type="button" onclick="answerTrueFalse(false)">
            <strong>False</strong>
            <span class="choice-sub">Glitch</span>
          </button>
        </div>
      `;
    }

    function renderMemory(question) {
      initMemoryState(question);
      const state = APP.memoryState;
      return `
        <article class="panel question-card">
          <h2>${question.prompt}</h2>
          <p class="subcopy">Reveal two cards and find the matching pair.</p>
        </article>
        <div class="memory-grid">
          ${state.cards.map((card) => {
            const isShown = state.revealed.includes(card.id) || state.matched.includes(card.id);
            return `
              <button class="memory-card ${state.matched.includes(card.id) ? "correct" : ""}" type="button" onclick="flipMemoryCard('${card.id}')">
                <strong>${isShown ? card.label : "?"}</strong>
              </button>
            `;
          }).join("")}
        </div>
      `;
    }

    function renderSequence(question) {
      initSequenceState(question);
      return `
        <article class="panel question-card">
          <h2>${question.prompt}</h2>
          <p class="subcopy">${question.subtitle || "Build the right order."}</p>
          <div class="sequence-built">
            ${(APP.sequenceState.built.length ? APP.sequenceState.built : ["Tap the chips below"]).map((step) => `
              <span class="sequence-chip">${step}</span>
            `).join("")}
          </div>
          <div class="sequence-bank">
            ${APP.sequenceState.bank.map((step) => `
              <button class="sequence-chip" type="button" onclick="pushSequenceStep('${step}')">${step}</button>
            `).join("")}
          </div>
          <div class="action-row" style="margin-top:14px">
            <button class="primary-btn" type="button" onclick="submitSequence()">Check order</button>
            <button class="secondary-btn" type="button" onclick="resetSequence()">Reset</button>
          </div>
        </article>
      `;
    }

    function renderQuestionBody(question) {
      if (GENERIC_CHOICE_MECHANICS.has(question.mechanicId)) {
        return renderGenericChoice(question);
      }
      if (question.mechanicId === "true-false") {
        return renderTrueFalse(question);
      }
      if (question.mechanicId === "memory") {
        return renderMemory(question);
      }
      if (question.mechanicId === "sequence") {
        return renderSequence(question);
      }
      return `
        <article class="panel question-card">
          <h2>${question.prompt}</h2>
          <p class="subcopy">This mechanic exists in the contract but needs a page-specific renderer.</p>
        </article>
      `;
    }

    function renderGame() {
      const question = activeQuestion();
      const total = Math.min(APP.config.progression.roundLength, APP.config.mechanics.length);
      const progress = total ? (APP.completed / total) * 100 : 0;
      return `
        <section class="screen active">
          <div class="progress-shell"><div class="progress-fill" style="width:${progress}%"></div></div>
          <div class="layout-two">
            <article class="panel">
              <span class="eyebrow">Round shell</span>
              <h2>${helperName()}</h2>
              <p>This is the stable game shell. Swap only the mechanic content inside it.</p>
              <div class="feedback-banner ${APP.feedbackType === "good" ? "good" : APP.feedbackType === "bad" ? "bad" : ""}" style="margin-top:12px">
                ${APP.feedbackText || "Make the next move."}
              </div>
            </article>
            <article class="panel">
              <span class="eyebrow">Mechanic</span>
              <h2>${question.mechanicId}</h2>
              <p>Question ${APP.questionIndex + 1} of ${total}</p>
            </article>
          </div>
          ${renderQuestionBody(question)}
        </section>
      `;
    }

    function renderVictory() {
      return `
        <section class="screen active">
          <article class="victory-card">
            <span class="eyebrow">Victory</span>
            <h1 class="victory-title">${APP.config.feedback.victory.title}</h1>
            <p>${APP.config.feedback.victory.summary}</p>
            <div class="action-row" style="margin-top:18px">
              <span class="pill">Final score ${APP.score}</span>
              <span class="pill">Stars ${APP.stars}</span>
              ${APP.config.progression.comboEnabled ? `<span class="pill">Final combo ${APP.combo}</span>` : ""}
            </div>
            <div class="action-row" style="margin-top:18px">
              <button class="primary-btn" type="button" onclick="startExperience()">Play again</button>
              <button class="secondary-btn" type="button" onclick="setScreen('landing')">Home</button>
            </div>
          </article>
        </section>
      `;
    }

    function renderScreen() {
      if (APP.screen === "landing") return renderLanding();
      if (APP.screen === "briefing") return renderBriefing();
      if (APP.screen === "select") return renderSelect();
      if (APP.screen === "map") return renderMap();
      if (APP.screen === "game") return renderGame();
      return renderVictory();
    }

    function render() {
      renderTopbar();
      document.getElementById("screenHost").innerHTML = renderScreen();
      document.getElementById("presetNote").textContent =
        `Preset ${APP.config.theme.skinId} · tone ${APP.config.theme.tone} · screens ${APP.config.flow.activeScreens.join(" -> ")}`;
    }

    function init(config) {
      validateConfig(config);
      APP.config = deepClone(config);
      applyTheme(APP.config);
      loadProgress();
      APP.screen = APP.config.flow.startScreen || "landing";
      APP.selectedHelperId = APP.config.helpers[0]?.id || null;
      APP.selectedMapNodeId = APP.config.mapNodes[0]?.id || null;
      render();
    }

    init(ACTIVE_CONFIG);
  </script>
</body>
</html>
