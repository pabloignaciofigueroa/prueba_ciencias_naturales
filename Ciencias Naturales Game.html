<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🔬 Ciencias Naturales — ¡El Juego!</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
:root {
  --card: rgba(255,255,255,0.72);
  --card-solid: #ffffff;
  --ink: #182338;
  --ink-title: #122039;
  --ink-muted: #42526d;
  --ink-soft: #5c6b84;
  --radius: 24px;
  --radius-lg: 32px;
  --glow-pink: #ff4dc4;
  --glow-cyan: #00e5ff;
  --glow-yellow: #ffe234;
  --glow-green: #39ff6e;
  --glow-orange: #ff7b2c;
  --font-ui: 'Nunito', sans-serif;
  --weight-medium: 600;
  --weight-bold: 700;
  --weight-xbold: 800;
  --weight-black: 900;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font-ui);
  background:
    linear-gradient(135deg, rgba(255,234,245,0.78) 0%, rgba(232,244,255,0.72) 35%, rgba(230,255,244,0.68) 65%, rgba(255,249,224,0.72) 100%),
    url('FONDOS/FONDO.png') center center / cover no-repeat fixed;
  background-attachment: fixed;
  background-size: 200% 200%, cover;
  animation: bgDrift 22s ease-in-out infinite alternate;
  color: var(--ink);
  min-height: 100vh;
  overflow-x: hidden;
}
@keyframes bgDrift {
  0%   { background-position: 0% 50%; }
  100% { background-position: 100% 50%; }
}

/* BUBBLE BG */
.bubblefield {
  position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
  opacity: 0.72;
}
.bubble {
  position: absolute;
  border-radius: 50%;
  filter: blur(1px);
  animation: bubbleFloat var(--dur, 18s) linear infinite var(--delay, 0s);
}
@keyframes bubbleFloat {
  0%   { transform: translateY(110vh) scale(0.85); opacity: 0; }
  8%   { opacity: var(--op, 0.12); }
  88%  { opacity: var(--op, 0.12); }
  100% { transform: translateY(-15vh) scale(1.1); opacity: 0; }
}

.app {
  position: relative; z-index: 1;
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; padding: 20px 16px 48px;
}

/* GLASS CARD */
.glass {
  background: rgba(255,255,255,0.72);
  border: 1px solid rgba(255,255,255,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: var(--radius-lg);
  box-shadow: 0 8px 40px rgba(0,0,0,0.10);
}

/* ---- WELCOME ---- */
.welcome-wrap {
  display: flex; flex-direction: column; align-items: center;
  gap: 0; max-width: 520px; width: 100%; margin-top: 0;
  animation: popIn .6s cubic-bezier(.34,1.56,.64,1);
}
.logo-block {
  text-align: center;
  position: relative;
  width: 100%;
  margin-bottom: 8px;
}
.logo-front-image {
  width: min(100%, 380px);
  height: auto;
  display: block;
  margin: 0 auto 4px;
  object-fit: contain;
  animation: float 3.5s ease-in-out infinite;
  filter: drop-shadow(0 8px 24px rgba(255,77,196,0.16));
}
.logo-planet {
  font-size: 88px; display: block;
  animation: float 3.5s ease-in-out infinite;
  filter: drop-shadow(0 0 24px rgba(255,77,196,0.5));
}
.logo-title {
  font-family: var(--font-ui);
  font-size: clamp(2.4rem, 7vw, 3.3rem);
  font-weight: var(--weight-black);
  line-height: 1.02;
  margin-top: 8px;
  color: var(--ink-title);
  letter-spacing: -0.04em;
}

.name-card {
  padding: 28px 32px 34px; width: 100%;
  display: flex; flex-direction: column; gap: 20px;
  align-items: center;
  text-align: center;
  margin-top: 0;
  border-radius: var(--radius-lg);
}
.name-label {
  font-family: var(--font-ui);
  font-size: clamp(1.75rem, 7.6vw, 2.2rem);
  font-weight: var(--weight-black);
  line-height: 1.08;
  color: var(--ink-title);
  letter-spacing: -0.04em;
  max-width: 12ch;
}
.name-input {
  width: min(100%, 300px); padding: 16px 20px;
  align-self: center;
  font-family: var(--font-ui);
  font-size: clamp(1.375rem, 6vw, 1.625rem);
  font-weight: var(--weight-bold);
  border: 2px solid rgba(255,77,196,0.42); border-radius: 22px;
  background: rgba(255,255,255,0.92); color: var(--ink-title);
  outline: none; text-align: center;
  transition: border-color .2s, box-shadow .2s;
}
.name-input:focus {
  border-color: var(--glow-pink);
  box-shadow: 0 0 0 4px rgba(255,77,196,0.16), 0 10px 24px rgba(18,32,57,0.08);
}
.name-input::placeholder { color: var(--ink-soft); opacity: 1; }

/* ---- SELECT ---- */
.select-wrap {
  max-width: 760px; width: 100%;
  display: flex; flex-direction: column; gap: 20px;
  animation: popIn .5s cubic-bezier(.34,1.56,.64,1);
}
.select-card {
  padding: 28px 26px 30px;
  display: flex; flex-direction: column; gap: 22px;
}
.select-top {
  display: flex; align-items: center; justify-content: space-between; gap: 18px;
}
.select-copy {
  display: flex; flex-direction: column; gap: 8px;
}
.select-kicker {
  font-size: .88rem;
  font-weight: var(--weight-black);
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--glow-pink);
}
.select-title {
  font-size: clamp(2rem, 6vw, 2.7rem);
  font-weight: var(--weight-black);
  line-height: 1.02;
  letter-spacing: -0.04em;
  color: var(--ink-title);
}
.select-sub {
  max-width: 32ch;
  font-size: 1rem;
  font-weight: var(--weight-bold);
  line-height: 1.42;
  color: var(--ink-muted);
}
.select-preview {
  width: 112px; height: 112px;
  padding: 12px;
  border-radius: 26px;
  background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(255,255,255,0.72));
  border: 1px solid rgba(255,255,255,0.92);
  box-shadow: 0 14px 34px rgba(24,35,56,0.12);
  flex-shrink: 0;
}
.select-preview img {
  width: 100%; height: 100%; object-fit: contain; display: block;
}
.select-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 16px;
}
.avatar-card {
  position: relative;
  border: 2px solid rgba(24,35,56,0.08);
  border-radius: 28px;
  background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(255,255,255,0.82));
  padding: 18px;
  cursor: pointer;
  transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
  text-align: left;
  overflow: hidden;
}
.avatar-card::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(circle at top right, rgba(255,77,196,0.16), transparent 46%);
  pointer-events: none;
}
.avatar-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 18px 34px rgba(24,35,56,0.12);
}
.avatar-card.selected {
  border-color: var(--glow-pink);
  box-shadow: 0 18px 34px rgba(255,77,196,0.16);
}
.avatar-figure {
  width: 100%;
  aspect-ratio: 1 / 1;
  border-radius: 22px;
  background: linear-gradient(180deg, rgba(255,241,248,0.95), rgba(235,247,255,0.85));
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 14px;
  position: relative;
  z-index: 1;
}
.avatar-figure img {
  width: 100%; height: 100%; object-fit: contain; display: block;
  filter: drop-shadow(0 10px 20px rgba(18,32,57,0.18));
}
.avatar-meta {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-top: 14px;
}
.avatar-name {
  font-size: 1.08rem;
  font-weight: var(--weight-black);
  color: var(--ink-title);
}
.avatar-note {
  margin-top: 4px;
  font-size: .95rem;
  font-weight: var(--weight-bold);
  color: var(--ink-soft);
}
.avatar-check {
  width: 34px; height: 34px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  background: rgba(24,35,56,0.08);
  color: transparent;
  font-size: 1rem;
  transition: background .18s ease, color .18s ease, transform .18s ease;
}
.avatar-card.selected .avatar-check {
  background: linear-gradient(135deg, var(--glow-pink), #ff9a5f);
  color: white;
  transform: scale(1.08);
}
.select-actions {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}
.player-chip {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-radius: 999px;
  background: rgba(255,255,255,0.88);
  border: 1px solid rgba(255,255,255,0.92);
  box-shadow: 0 8px 24px rgba(24,35,56,0.08);
}
.player-chip img {
  width: 42px; height: 42px; object-fit: contain; display: block;
}
.player-chip-copy {
  display: flex; flex-direction: column; gap: 2px; text-align: left;
}
.player-chip-label {
  font-size: .72rem;
  font-weight: var(--weight-black);
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--ink-soft);
}
.player-chip-name {
  font-size: .98rem;
  font-weight: var(--weight-black);
  color: var(--ink-title);
}

/* ---- MAP ---- */
.map-wrap {
  max-width: 660px; width: 100%;
  display: flex; flex-direction: column; gap: 22px;
  animation: slideUp .4s ease;
}
.map-header { text-align: center; display: flex; flex-direction: column; gap: 10px; align-items: center; }
.map-greeting {
  font-family: var(--font-ui);
  font-size: clamp(2rem, 6vw, 2.8rem);
  font-weight: var(--weight-black);
  line-height: 1.08;
  color: var(--ink-title);
  letter-spacing: -0.04em;
}
.map-sub {
  color: var(--ink-muted);
  font-size: 1.05rem;
  font-weight: var(--weight-bold);
  margin-top: 0;
}
.worlds-grid {
  display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px;
  align-items: stretch;
}
.world-card {
  border-radius: var(--radius); padding: 22px 20px;
  cursor: pointer; border: 1px solid rgba(255,255,255,0.92);
  text-align: left; position: relative; overflow: hidden;
  transition: transform .18s ease-out, box-shadow .2s ease-out, background .2s ease-out;
  background: rgba(255,255,255,0.78);
}
.world-card::before {
  content: '';
  position: absolute; inset: 0;
  background: var(--w-grad);
  opacity: 0.10;
  transition: opacity .2s ease-out;
}
.world-card:hover { transform: translateY(-4px); }
.world-card:hover::before { opacity: 0.18; }
.world-card:hover { box-shadow: 0 12px 34px var(--w-glow); }
.world-card:active { transform: scale(0.98); }
.world-card.full-width { grid-column: 1 / -1; }
.world-card-shine {
  position: absolute; top: -40px; right: -40px;
  width: 140px; height: 140px; border-radius: 50%;
  background: radial-gradient(circle, rgba(255,255,255,0.55) 0%, transparent 70%);
  pointer-events: none;
}
.world-card-icon-img {
  width: 48px; height: 48px; object-fit: contain;
  display: block; margin-bottom: 8px; position: relative; z-index: 1;
}
.world-card-num {
  font-family: var(--font-ui);
  font-size: clamp(0.75rem, 3vw, 0.875rem);
  font-weight: var(--weight-black);
  letter-spacing: .12em; opacity: 1; text-transform: uppercase;
  position: relative; z-index: 1; color: var(--w-color);
}
.world-card-title {
  font-family: var(--font-ui);
  font-size: clamp(1.25rem, 5vw, 1.5rem);
  font-weight: var(--weight-black);
  line-height: 1.12; margin-top: 4px; position: relative; z-index: 1;
  color: var(--ink-title);
}
.world-card-hook {
  font-size: clamp(0.9375rem, 4vw, 1.125rem);
  font-weight: var(--weight-bold);
  line-height: 1.35;
  opacity: 1;
  margin-top: 6px;
  position: relative;
  z-index: 1;
  color: var(--ink-muted);
}
.world-card-stars { display: flex; gap: 3px; margin-top: 12px; position: relative; z-index: 1; }
.world-card-star-img {
  width: 20px; height: 20px; object-fit: contain;
  transition: filter .2s, transform .2s;
}
.world-card-star-img.lit { transform: scale(1.15); }
.world-card-star-img.dim { filter: grayscale(1) opacity(0.35); }

.total-bar {
  padding: 16px 22px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px;
}
.total-label {
  font-family: var(--font-ui);
  font-size: 1.05rem;
  font-weight: var(--weight-xbold);
  color: var(--ink-muted);
}
.total-val {
  font-family: var(--font-ui);
  font-size: 1.4rem;
  font-weight: var(--weight-black);
  color: var(--ink-title);
}

/* ---- INTRO ---- */
.intro-wrap {
  max-width: 480px; width: 100%;
  display: flex; flex-direction: column; gap: 20px; margin-top: 24px;
  animation: popIn .45s cubic-bezier(.34,1.56,.64,1);
}
.intro-card {
  padding: 40px 28px;
  text-align: center;
  display: flex; flex-direction: column; align-items: center; gap: 14px;
  border-color: var(--w-color) !important;
}
.intro-icon-img {
  width: 80px; height: 80px; object-fit: contain;
  animation: float 2.8s ease-in-out infinite;
  filter: drop-shadow(0 0 16px var(--w-color));
}
.intro-world-num {
  font-family: var(--font-ui);
  font-size: clamp(0.78rem, 3vw, 0.92rem);
  font-weight: var(--weight-black);
  letter-spacing: .14em; text-transform: uppercase; opacity: 1;
  color: var(--w-color);
}
.intro-title {
  font-family: var(--font-ui);
  font-size: clamp(1.85rem, 6vw, 2.45rem);
  font-weight: var(--weight-black);
  line-height: 1.05;
  color: var(--ink-title);
  letter-spacing: -0.035em;
}
.intro-hook {
  font-size: clamp(1rem, 4vw, 1.08rem);
  font-weight: var(--weight-bold);
  line-height: 1.38;
  opacity: 1;
  max-width: 330px;
  color: var(--ink-muted);
}
.intro-info {
  font-size: .96rem;
  opacity: 1;
  font-weight: var(--weight-bold);
  color: var(--ink-soft);
}

/* ---- QUESTION ---- */
.question-wrap {
  max-width: 560px; width: 100%;
  display: flex; flex-direction: column; gap: 16px; margin-top: 10px;
  animation: slideUp .35s ease;
}
.q-topbar {
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.q-world-badge {
  display: flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,0.86); border-radius: 999px; padding: 10px 16px;
  border: 1px solid var(--w-color);
  font-family: var(--font-ui);
  font-size: 0.98rem;
  font-weight: var(--weight-xbold);
  color: var(--ink-title);
  box-shadow: 0 2px 12px rgba(0,0,0,0.07);
}
.q-world-badge-img { width: 22px; height: 22px; object-fit: contain; }
.q-dots { display: flex; gap: 7px; }
.q-dot {
  width: 13px; height: 13px; border-radius: 50%;
  background: rgba(0,0,0,0.15); transition: background .3s, transform .3s;
}
.q-dot.done { background: var(--w-color); box-shadow: 0 0 8px var(--w-color); }
.q-dot.active { background: var(--ink); transform: scale(1.3); box-shadow: 0 0 8px rgba(26,26,46,0.3); }

.q-progress-bar {
  height: 8px; border-radius: 999px; background: rgba(0,0,0,0.08); overflow: hidden;
}
.q-progress-fill {
  height: 100%; border-radius: 999px;
  background: var(--w-grad);
  transition: width .45s cubic-bezier(.34,1.56,.64,1);
  box-shadow: 0 0 10px var(--w-color);
}

.q-card {
  border-radius: var(--radius);
  overflow: hidden;
  border: 1px solid rgba(0,0,0,0.07);
  background: var(--card-solid);
  box-shadow: 0 4px 24px rgba(0,0,0,0.08);
}
.q-card-header {
  padding: 22px 24px 18px;
  border-bottom: 1px solid rgba(0,0,0,0.06);
  background: rgba(0,0,0,0.02);
}
.q-header-inner {
  display: grid;
  grid-template-columns: minmax(0, 1fr) clamp(48px, 10vw, 60px);
  align-items: center;
  gap: 14px;
}
.q-header-text { flex: 1; min-width: 0; }
.q-icon {
  width: 100%; height: auto; object-fit: contain;
  max-height: 60px;
  flex-shrink: 0; align-self: center;
}
.q-label {
  font-family: var(--font-ui);
  font-size: clamp(0.78rem, 3vw, 0.9rem);
  font-weight: var(--weight-black);
  letter-spacing: .1em; text-transform: uppercase;
  color: var(--w-color); opacity: 1;
}
.q-text {
  font-family: var(--font-ui);
  font-size: clamp(1.45rem, 5.5vw, 1.95rem);
  font-weight: var(--weight-black);
  line-height: 1.24;
  margin-top: 8px;
  color: var(--ink-title);
  letter-spacing: -0.03em;
}
.q-options {
  padding: 18px 20px 20px;
  display: grid; gap: 10px;
  align-items: stretch;
}
.q-options.two-col { grid-template-columns: 1fr 1fr; }
.q-options.one-col { grid-template-columns: 1fr; }

.opt-btn {
  min-height: 68px;
  padding: 15px 18px; border-radius: 16px;
  font-family: var(--font-ui); font-size: 1.1rem; font-weight: var(--weight-black);
  border: 2px solid rgba(0,0,0,0.09); cursor: pointer;
  background: rgba(255,255,255,0.9); color: var(--ink-title);
  transition: transform .15s, background .15s, border-color .15s, box-shadow .15s;
  line-height: 1.2; text-align: center;
  white-space: normal;
  overflow-wrap: anywhere;
}
.opt-btn:hover:not(:disabled) {
  transform: translateY(-2px);
  background: white;
  border-color: var(--w-color);
  box-shadow: 0 4px 20px var(--w-glow);
}
.opt-btn:active:not(:disabled) { transform: translateY(0); }
.opt-btn.correct {
  background: rgba(22,163,74,0.12); border-color: #16a34a; color: #15803d;
  box-shadow: 0 0 16px rgba(22,163,74,0.2);
  animation: correctPop .4s cubic-bezier(.34,1.56,.64,1);
}
.opt-btn.wrong {
  background: rgba(220,38,38,0.09); border-color: #dc2626; color: #b91c1c;
  animation: shake .35s ease;
}
.opt-btn:disabled { cursor: default; }

.q-feedback {
  margin: 0 20px 20px;
  border-radius: 14px; padding: 14px 18px;
  font-family: var(--font-ui);
  font-size: 1.12rem;
  font-weight: var(--weight-xbold);
  line-height: 1.3;
  text-align: center; letter-spacing: 0;
  animation: slideUp .3s ease;
}
.q-feedback.good { background: rgba(22,163,74,0.12); color: #15803d; border: 1px solid rgba(22,163,74,0.3); }
.q-feedback.bad  { background: rgba(255,140,0,0.10); color: #b45a00; border: 1px solid rgba(255,140,0,0.28); }

/* ---- WORLD END ---- */
.wend-wrap {
  max-width: 480px; width: 100%;
  display: flex; flex-direction: column; gap: 20px; margin-top: 24px;
  align-items: center; animation: popIn .5s cubic-bezier(.34,1.56,.64,1);
}
.wend-card {
  padding: 40px 28px; width: 100%; text-align: center;
  display: flex; flex-direction: column; align-items: center; gap: 14px;
  border-color: var(--w-color) !important;
}
.wend-world-icon { width: 72px; height: 72px; object-fit: contain; }
.wend-title {
  font-family: var(--font-ui);
  font-size: clamp(2rem, 6vw, 2.5rem);
  font-weight: var(--weight-black);
  line-height: 1.05;
  letter-spacing: -0.035em;
  color: var(--w-color);
}
.wend-score {
  font-size: 1.02rem;
  font-weight: var(--weight-bold);
  line-height: 1.4;
  color: var(--ink-muted);
}

.stars-row { display: flex; gap: 14px; justify-content: center; margin: 6px 0; }
.star-img {
  width: 56px; height: 56px; object-fit: contain;
  filter: grayscale(1) brightness(0.55);
  transform: scale(0.82);
  transition: filter .4s, transform .4s;
}
.star-img.lit {
  filter: drop-shadow(0 0 14px #e6a800) drop-shadow(0 0 6px rgba(255,200,0,0.6));

.img-btn {
  --btn-w: 220px;

  cursor: pointer; display: inline-flex;
  align-items: center; justify-content: center;
  width: min(100%, var(--btn-w));
  max-width: 100%;
  transition: transform .15s, filter .15s;
  line-height: 0;
}
.img-btn:hover:not(:disabled) {
  transform: translateY(-2px);
  filter: brightness(1.05) drop-shadow(0 4px 14px rgba(0,0,0,0.22));
}
.img-btn:active:not(:disabled) { transform: scale(0.97); }
.img-btn:disabled { opacity: .35; cursor: not-allowed; }
.img-btn img { display: block; width: 100%; height: auto; object-fit: contain; }
.btn-start-star { --btn-w: 160px; aspect-ratio: 1001 / 354; margin: 0 auto; }
.btn-play     { --btn-w: 240px; aspect-ratio: 82 / 93; margin: 0 auto; }
.btn-back     { --btn-w: 132px; aspect-ratio: 101 / 85; }
.btn-restart  { --btn-w: 59px; aspect-ratio: 96 / 107; }
.btn-map      { --btn-w: 74px; aspect-ratio: 101 / 85; }

  box-shadow: 0 8px 24px rgba(0,0,0,0.10);

  align-items: center;
  justify-content: center;

  font-weight: var(--weight-black);
  letter-spacing: .04em;
  line-height: 1;

.next-inline-btn:active,

  align-self: center;

.next-inline-btn img {

.next-inline-btn span {

.back-inline-btn {

.back-inline-btn img {

/* ---- REACTION OVERLAY ---- */
.reaction-overlay {
  position: fixed; top: 43%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 300; pointer-events: none;
  animation: reactionPop .38s cubic-bezier(.34,1.56,.64,1);
}
.reaction-overlay img {
  max-width: 150px; width: 39vw; height: auto;
  object-fit: contain; display: block;
  filter: drop-shadow(0 8px 28px rgba(0,0,0,0.28));
}
@keyframes reactionPop {
  from { opacity: 0; transform: translate(-50%, -50%) scale(0.45) translateY(28px); }
  to   { opacity: 1; transform: translate(-50%, -50%) scale(1) translateY(0); }
}

/* ---- CAMERA SHAKE ---- */
@keyframes cameraShake {
  0%,100% { transform: translateX(0) rotate(0deg); }
  15%     { transform: translateX(-11px) rotate(-1.5deg); }
  30%     { transform: translateX(11px) rotate(1.5deg); }
  45%     { transform: translateX(-8px) rotate(-1deg); }
  60%     { transform: translateX(8px) rotate(1deg); }
  75%     { transform: translateX(-4px) rotate(-.5deg); }
  90%     { transform: translateX(4px) rotate(.5deg); }
}
.camera-shake {
  animation: cameraShake 0.55s ease !important;
}

/* ---- PARTICLES ---- */
.particles-layer {
  position: fixed; inset: 0; pointer-events: none; z-index: 100; overflow: hidden;
}
.particle {
  position: absolute;
  animation: particleFly .7s ease-out forwards;
}

/* ---- KEYFRAMES ---- */
@keyframes popIn {
  from { opacity: 0; transform: scale(.8) translateY(12px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-5px); }
  80% { transform: translateX(5px); }
}
@keyframes correctPop {
  from { transform: scale(.92); }
  50% { transform: scale(1.07); }
  to { transform: scale(1); }
}
@keyframes starPop {
  from { transform: scale(0) rotate(-20deg); opacity: 0; }
  60% { transform: scale(1.55) rotate(12deg); opacity: 1; }
  to { transform: scale(1.3) rotate(0deg); opacity: 1; }
}
@keyframes particleFly {
  from { opacity: 1; transform: translate(0,0) scale(1); }
  to { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(.15); }
}

function getQuestionIcon(prompt) {
  const lower = prompt.toLowerCase();
  for (const [key, icon] of ICON_MAP) {
    if (lower.includes(key)) return icon;
  }
  return null;
}

];
const BURST_COLORS = ['#ff4dc4','#00e5ff','#ffe234','#39ff6e','#ff7b2c','#9b5dff','#ff0044'];

function rand(arr) { return arr[Math.floor(Math.random()*arr.length)]; }
function shuffle(arr) { return [...arr].sort(()=>Math.random()-.5); }
function displayOpt(o) {
  if(o==='V') return '✓ Verdadero';
  if(o==='F') return '✗ Falso';
  return o;
}
function calcStars(correct) {
  if(correct===5) return 3;
  if(correct>=3) return 2;
  if(correct>=1) return 1;
  return 0;
}
function drawRound(section, seenMap) {
  const qs=[];
  for(const bucket of section.draw_plan) {
    const pool = section.pools[bucket];
    if(!pool||pool.length===0) continue;
    const seenIds = (seenMap[section.id]||{})[bucket]||[];
    const avail = pool.filter(q=>!seenIds.includes(q.id));
    const src = avail.length>0 ? avail : pool;
    qs.push({ ...rand(src), bucketName:bucket });
  }
  return qs;
}
function updateSeen(seenMap, worldId, questions) {
  const worldSeen = { ...(seenMap[worldId]||{}) };
  for(const q of questions) {
    const prev = worldSeen[q.bucketName]||[];
    if(!prev.includes(q.id)) worldSeen[q.bucketName] = [...prev, q.id];
  }
  return { ...seenMap, [worldId]: worldSeen };
}

function BubbleField() {
  const bubbles = useMemo(() => {
    const colors = ['#ff4dc4','#9b5dff','#00e5ff','#39ff6e','#ffe234','#ff7b2c','#0099bb'];
    const b = [];
    for(let i=0; i<16; i++) {
      b.push({
        id: i, x: Math.random()*100,
        size: 44 + Math.random()*160,
        color: colors[Math.floor(Math.random()*colors.length)],
        dur: 14 + Math.random()*20,
        delay: -(Math.random()*24),
        op: 0.04 + Math.random()*0.05
      });
    }
    return b;
  }, []);
  return (
    <div className="bubblefield">
      {bubbles.map(b=>(
        <div key={b.id} className="bubble" style={{
          left:`${b.x}%`, width:b.size, height:b.size, background:b.color,
          '--dur':`${b.dur}s`, '--delay':`${b.delay}s`, '--op': b.op,
          marginLeft: -b.size/2

  );
}

      });

    localStorage.setItem('cn-selected-character', characterId);
  }

  function handleContinueFromSelect() {
    localStorage.setItem('cn-selected-character', selectedCharacter);
    setScreen('map');
  }

  function handleSelectWorld(i) { setWorldIdx(i); setScreen('intro'); }

  function handlePlayWorld() {
    if(retryTimerRef.current) clearTimeout(retryTimerRef.current);
    if(reactTimerRef.current) clearTimeout(reactTimerRef.current);
    correctRef.current = 0;
    const sec = GAME_DATA.sections[worldIdx];
    const qs  = drawRound(sec, seenRef.current);
    seenRef.current = updateSeen(seenRef.current, sec.id, qs);
    setQuestions(shuffle(qs.map(q=>({...q, options:shuffle(q.options)}))));
    setQIdx(0); setCorrectCount(0); setFeedback(null); setSelectedOpt(null);
    setShaking(false); setReactionImg(null); setRetryMsg(''); setFinalStars(0);
    setScreen('question');
  }

  function handleAnswer(opt) {
    if(feedback) return;
    const q = questions[qIdx];
    const correct = opt === q.answer;
    setSelectedOpt(opt);
    setFeedback(correct ? 'correct' : 'wrong');

    if(correct) {
      correctRef.current += 1;
      setCorrectCount(correctRef.current);
      burst();
      showReaction('correcto');
    } else {
      setRetryMsg(rand(RETRY_MSGS));
      showReaction('fallo');
      setShaking(true);
      retryTimerRef.current = setTimeout(()=>{
        setFeedback(null);
        setSelectedOpt(null);
        setShaking(false);
        setRetryMsg('');
      }, 1800);
    }
  }

  function handleNext() {
    if(qIdx < questions.length-1) {
      setQIdx(i=>i+1);
      setFeedback(null);
      setSelectedOpt(null);
    } else {
      const stars = calcStars(correctRef.current);
      setFinalStars(stars);
      const newStars = [...worldStars];
      newStars[worldIdx] = Math.max(newStars[worldIdx]||0, stars);
      setWorldStars(newStars);
      localStorage.setItem('cn-world-stars', JSON.stringify(newStars));
      setScreen('worldend');
    }
  }

  function handleMap() {
    const updatedStars = worldStars;
    const done = updatedStars.every(s=>s>0);
    setScreen(done ? 'final' : 'map');
  }

  function handleRestart() {
    const fresh = [0,0,0,0,0];
    setWorldStars(fresh);
    localStorage.setItem('cn-world-stars', JSON.stringify(fresh));
    seenRef.current = {};
    setScreen('map');
  }

  return (
    <>
      <BubbleField/>
      <div className="app">
        {screen==='welcome' && <WelcomeScreen onStart={handleStart}/>}
        {screen==='select'  && (
          <SelectScreen
            name={name}
            selectedCharacter={selectedCharacter}
            onSelectCharacter={handleChooseCharacter}
            onContinue={handleContinueFromSelect}
            onBack={()=>setScreen('welcome')}
          />
        )}
        {screen==='map'     && <MapScreen name={name} worldStars={worldStars} character={activeCharacter} onSelect={handleSelectWorld}/>}
        {screen==='intro'   && <IntroScreen worldIdx={worldIdx} name={name} onPlay={handlePlayWorld} onBack={()=>setScreen('map')}/>}
        {screen==='question' && (
          <QuestionScreen
            worldIdx={worldIdx} questions={questions} qIdx={qIdx}
            name={name} feedback={feedback} selectedOpt={selectedOpt}
            shaking={shaking} retryMsg={retryMsg}
            onAnswer={handleAnswer} onNext={handleNext}
          />
        )}
        {screen==='worldend' && (
          <WorldEndScreen
            worldIdx={worldIdx} name={name} correctCount={correctRef.current}
            stars={finalStars}
            onReplay={handlePlayWorld} onMap={handleMap}
          />
        )}
        {screen==='final' && <FinalScreen name={name} worldStars={worldStars} onRestart={handleRestart}/>}
      </div>
      <Particles particles={particles}/>
      <ReactionOverlay img={reactionImg}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
